<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organization Sign Up - Community & Animal Support</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />

  <style>
    :root {
      --bg:          #f2f6f9;
      --white:       #ffffff;
      --border:      #d8e4ec;
      --text:        #162030;
      --muted:       #607080;
      --icon:        #90a8b8;
      --accent:      #1a6b8a;
      --accent-light:#1f7fa3;
      --accent-pale: #e8f4f9;
      --accent-glow: rgba(26,107,138,0.15);
      --transition:  0.25s ease;
      --shadow:      0 4px 24px rgba(26,107,138,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(ellipse at 80% 20%, rgba(26,107,138,0.07) 0%, transparent 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    main {
      width: 100%;
      max-width: 620px;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 28px;
      transition: color var(--transition);
    }

    .back-link:hover { color: var(--accent); }

    .form-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-top {
      background: var(--accent-pale);
      border-bottom: 1px solid var(--border);
      padding: 28px 36px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .top-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-top h1 { font-size: 20px; font-weight: 800; margin-bottom: 3px; }
    .card-top p  { font-size: 12px; color: var(--muted); }

    .form-body { padding: 36px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-row.full { grid-template-columns: 1fr; }

    .field { display: flex; flex-direction: column; gap: 7px; }

    .field label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .input-wrap { position: relative; display: flex; align-items: center; }

    .input-wrap .fi {
      position: absolute;
      left: 14px;
      font-size: 13px;
      color: var(--icon);
      pointer-events: none;
      transition: color var(--transition);
    }

    .input-wrap input,
    .input-wrap select {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      padding: 12px 14px 12px 40px;
      outline: none;
      appearance: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-wrap input::placeholder { color: var(--icon); }
    .input-wrap input:hover,
    .input-wrap select:hover { border-color: #a0c0d0; }

    .input-wrap input:focus,
    .input-wrap select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-wrap:focus-within .fi { color: var(--accent); }

    .divider {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 28px 0 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .strength-bar { display: flex; gap: 4px; margin-top: 6px; }
    .strength-bar span {
      flex: 1; height: 3px; border-radius: 2px;
      background: var(--border);
      transition: background 0.3s ease;
    }

    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      cursor: pointer;
    }

    .terms-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 17px; height: 17px; min-width: 17px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
      cursor: pointer;
      position: relative;
      margin-top: 1px;
      transition: all var(--transition);
    }

    .terms-row input:checked { background: var(--accent); border-color: var(--accent); }

    .terms-row input:checked::after {
      content: '\f00c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      font-size: 9px;
      color: white;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .terms-row a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .terms-row a:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      transition: all var(--transition);
    }

    .btn-submit:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26,107,138,0.3);
    }

    .btn-submit:active { transform: translateY(0); box-shadow: none; }

    .login-link { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
    .login-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      .form-row { grid-template-columns: 1fr; }
      .form-body { padding: 24px 20px; }
      .card-top { padding: 22px 20px; }
      body { padding: 24px 16px; }
    }
  </style>
</head>

<body>
<main>

  <a class="back-link" href="signup.html">
    <i class="fa-solid fa-arrow-left"></i> Back to account types
  </a>

  <div class="form-card">

    <div class="card-top">
      <div class="top-icon"><i class="fa-solid fa-building-ngo"></i></div>
      <div>
        <h1>Organization Account</h1>
        <p>Register your group to manage campaigns and rescue cases.</p>
      </div>
    </div>

    <div class="form-body">

      <div class="form-row full">
        <div class="field">
          <label>Organization Name</label>
          <div class="input-wrap">
            <i class="fa-solid fa-building fi"></i>
            <input type="text" placeholder="e.g. Jordan Animal Rescue" />
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Organization Type</label>
          <div class="input-wrap">
            <i class="fa-solid fa-tag fi"></i>
            <select>
              <option value="">Select type</option>
              <option>Animal Welfare</option>
              <option>Social Support NGO</option>
              <option>Charity / Foundation</option>
              <option>Government Agency</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Registration Number</label>
          <div class="input-wrap">
            <i class="fa-solid fa-id-card fi"></i>
            <input type="text" placeholder="Official reg. number" />
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Contact Email</label>
          <div class="input-wrap">
            <i class="fa-solid fa-envelope fi"></i>
            <input type="email" placeholder="org@example.com" />
          </div>
        </div>
        <div class="field">
          <label>Phone Number</label>
          <div class="input-wrap">
            <i class="fa-solid fa-phone fi"></i>
            <input type="tel" placeholder="+962 6X XXX XXXX" />
          </div>
        </div>
      </div>

      <div class="form-row full">
        <div class="field">
          <label>Website (Optional)</label>
          <div class="input-wrap">
            <i class="fa-solid fa-globe fi"></i>
            <input type="url" placeholder="https://yourorg.org" />
          </div>
        </div>
      </div>

      <div class="divider">Account Security</div>

      <div class="form-row">
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock fi"></i>
            <input type="password" placeholder="Min. 8 characters" id="pw" oninput="strengthCheck()" />
          </div>
          <div class="strength-bar" id="sb">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock fi"></i>
            <input type="password" placeholder="Repeat password" />
          </div>
        </div>
      </div>

      <label class="terms-row">
        <input type="checkbox" />
        I confirm this organization is legitimate and I agree to the <a href="#">Terms of Service</a>
      </label>

      <a href="home.html" class="btn-submit">
        <i class="fa-solid fa-arrow-right"></i> Register Organization
      </a>

      <p class="login-link">Already have an account? <a href="login.html">Sign in</a></p>

    </div>
  </div>

</main>

<script>
  function strengthCheck() {
    const val = document.getElementById('pw').value;
    const bars = document.getElementById('sb').querySelectorAll('span');
    const colors = ['#e74c3c', '#e8722a', '#f0c040', '#1a6b8a'];
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    bars.forEach((b, i) => {
      b.style.background = i < score ? colors[score - 1] : '#d8e4ec';
    });
  }
</script>

</body>
</html>
