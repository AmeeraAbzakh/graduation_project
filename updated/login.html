<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Community & Animal Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <style>
    :root {
      --green: #2d7a3a;
      --green-light: #3d9e4e;
      --green-pale: #eaf4ec;
      --orange: #e8722a;
      --text: #1a2e1a;
      --muted: #6b7f6b;
      --border: #dde5d8;
      --bg: #f4f6f3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 28px; }
    .logo i { color: var(--green); font-size: 18px; }
    .logo i.orange { color: var(--orange); }
    .logo span { font-size: 13px; font-weight: 800; color: var(--text); letter-spacing: 1px; }
    h1 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .subtitle a { color: var(--green); font-weight: 600; text-decoration: none; }
    .subtitle a:hover { text-decoration: underline; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-box { position: relative; }
    .input-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 13px; }
    .input-box input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-box input:focus { border-color: var(--green); }
    .input-box input::placeholder { color: #bbb; }
    .extras { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 12px; }
    .remember { display: flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; }
    .remember input { accent-color: var(--green); cursor: pointer; }
    .forgot { color: var(--green); font-weight: 600; text-decoration: none; }
    .forgot:hover { text-decoration: underline; }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      display: block;
      text-align: center;
      text-decoration: none;
    }
    .btn-login:hover { background: var(--green-light); }
    .bottom { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
    .bottom a { color: var(--green); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <i class="fa-solid fa-paw"></i>
      <i class="fa-solid fa-heart orange"></i>
      <span>Community Support</span>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Don't have an account? <a href="signup.html">Sign up here</a></p>
    <div class="field">
      <label>Email</label>
      <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="your@email.com" />
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Enter your password" />
      </div>
    </div>
    <div class="extras">
      <label class="remember">
        <input type="checkbox" /> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <a href="dashboard.html" class="btn-login">Sign In</a>
    <p class="bottom">New here? <a href="signup.html">Create a free account</a></p>
  </div>
</body>
</html>
